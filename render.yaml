# Render blueprint for ResQ (pnpm + turbo monorepo).
#
# Resources:
#   - resq-db        Managed PostgreSQL 16
#   - resq-redis     Managed Key Value (Valkey, Redis-compatible) for BullMQ + Socket.IO
#   - resq-api       Express + Socket.IO + Prisma (apps/api)
#   - resq-web       Next.js 14 (apps/web)
#
# After the first deploy:
#   1. Copy the public URL of resq-api (e.g. https://resq-api.onrender.com).
#   2. Set it on resq-web as NEXT_PUBLIC_API_URL and NEXT_PUBLIC_SOCKET_URL,
#      then trigger a manual rebuild of resq-web (these are baked at build time).
#   3. Set the same URL on resq-api as PUBLIC_BASE_URL.
#   4. Set resq-web's public URL on resq-api as WEB_ORIGIN.

databases:
  - name: resq-db
    databaseName: resq
    user: resq
    plan: free            # bump to `starter` or higher for prod
    postgresMajorVersion: 16

services:
  - type: keyvalue        # Render's Redis-compatible offering (Valkey)
    name: resq-redis
    plan: free            # 25 MB; fine for demo, raise for prod
    ipAllowList: []       # private network only — no public access
    maxmemoryPolicy: noeviction   # BullMQ requires noeviction so jobs aren't lost

  - type: web
    name: resq-api
    runtime: node
    plan: free            # bump to `starter` for always-on (no cold starts)
    region: oregon        # pick one region and use it for db/redis/api/web
    rootDir: .
    # Prisma client is generated twice for belt-and-suspenders: once by
    # @resq/api's postinstall, and again at the start of `pnpm build`.
    # Either alone has historically been flaky under pnpm + turbo on CI.
    #
    # Note: don't `corepack enable` — Render's Node images ship pnpm at
    # /opt/render/.local/share/pnpm and the build container's /usr/bin
    # is read-only, so corepack errors with EROFS.
    buildCommand: |
      pnpm install --frozen-lockfile &&
      pnpm --filter @resq/api build
    # `preDeployCommand` is paid-plan only on Render, so the migration
    # runs as part of the start command instead. `prisma migrate deploy`
    # is idempotent — it only applies new migrations, so re-running on
    # every boot adds ~1s and is safe.
    startCommand: pnpm --filter @resq/api exec prisma migrate deploy && pnpm --filter @resq/api start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT; the API reads process.env.PORT via env.ts.
      - key: DATABASE_URL
        fromDatabase:
          name: resq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: resq-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # Render generates a 256-bit secret
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: REFRESH_EXPIRES_IN
        value: 14d
      # Set these to the deployed web URL after first deploy.
      - key: WEB_ORIGIN
        sync: false                # e.g. https://resq-web.onrender.com
      - key: PUBLIC_BASE_URL
        sync: false                # e.g. https://resq-api.onrender.com (used by AT webhooks)
      # Optional third-party keys — set in dashboard, leave blank to disable.
      - key: AFRICAS_TALKING_API_KEY
        sync: false
      - key: AFRICAS_TALKING_USERNAME
        value: sandbox
      - key: AFRICAS_TALKING_SHORTCODE
        sync: false
      - key: AFRICAS_TALKING_USSD_CODE
        value: "*384#"
      - key: AFRICAS_TALKING_SENDER_ID
        value: ResQ
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_DEFAULT_MODEL
        value: anthropic/claude-3.5-sonnet
      - key: OPENROUTER_WHISPER_MODEL
        value: openai/whisper-large-v3
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_AGENT_ID
        sync: false
      - key: ELEVENLABS_WEBHOOK_SECRET
        sync: false
      - key: DEMO_FALLBACK_LAT
        value: "4.8156"
      - key: DEMO_FALLBACK_LNG
        value: "7.0498"
      - key: DEMO_FALLBACK_JITTER_KM
        value: "0.5"

  - type: web
    name: resq-web
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      pnpm install --frozen-lockfile &&
      pnpm --filter @resq/web build
    # next start honours $PORT, which Render injects.
    startCommand: pnpm --filter @resq/web exec next start -p $PORT
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # NEXT_PUBLIC_* values are baked into the bundle at build time. After
      # the first deploy, paste resq-api's public URL here and click
      # "Manual Deploy → Clear build cache & deploy" so they get re-baked.
      - key: NEXT_PUBLIC_API_URL
        sync: false                # e.g. https://resq-api.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false                # e.g. https://resq-api.onrender.com
      - key: NEXT_PUBLIC_ELEVENLABS_AGENT_ID
        sync: false
