services:
  postgres:
    image: postgres:16-alpine
    container_name: resq-postgres
    environment:
      POSTGRES_USER: resq
      POSTGRES_PASSWORD: resq
      POSTGRES_DB: resq
    ports:
      - "5433:5432"
    volumes:
      - resq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resq -d resq"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: resq-redis
    ports:
      - "6379:6379"
    volumes:
      - resq_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  resq_pgdata:
  resq_redisdata:
